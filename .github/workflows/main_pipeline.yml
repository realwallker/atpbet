name: ATP Bypass Daily Scan

on:
  schedule:
    # 11:00 UTC = 06:00 AM Ecuador — cuotas del día ya publicadas en Europa
    - cron: "0 11 * * *"
    # Reentrenamiento: lunes a las 10:00 UTC
    - cron: "0 10 * * 1"
  workflow_dispatch:

jobs:
  run-bypass:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v3

      - name: Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar Librerías Necesarias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy xgboost scikit-learn requests textblob
          python -m textblob.download_corpora

      - name: Crear Estructura de Carpetas
        run: mkdir -p data/raw data/processed

      # ── REENTRENAMIENTO (solo lunes o manual) ────────────────────────
      - name: Reentrenar Modelo
        if: github.event.schedule == '0 10 * * 1' || github.event_name == 'workflow_dispatch'
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: |
          python src/generar_features.py
          python src/entrenar_modelo.py

      - name: Subir Modelo y Features como Artifacts
        if: github.event.schedule == '0 10 * * 1' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: modelo-atp-v2
          path: |
            data/processed/modelo_v2.pkl
            data/processed/atp_features.csv
          retention-days: 90

      # ── SCANNER DIARIO ───────────────────────────────────────────────
      - name: Descargar Modelo y Features desde Artifacts
        if: github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: modelo-atp-v2
          path: data/processed/
        continue-on-error: true

      - name: Verificar archivos descargados
        if: github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          echo "=== Archivos en data/processed/ ==="
          ls -lh data/processed/ || echo "Carpeta vacía"

      - name: Ejecutar Escáner de Apuestas
        if: github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch'
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p data/processed
          python src/main.py
