name: ATP Bypass Daily Scan

on:
  schedule:
    # 08:00 UTC = 03:00 AM en Guayaquil (ECT)
    # Corre todos los días (lunes a domingo)
    - cron: "0 8 * * *"
  workflow_dispatch: # Mantenlo para pruebas manuales

jobs:
  run-bypass:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v3

      - name: Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar Librerías Necesarias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy xgboost scikit-learn requests textblob
          python -m textblob.download_corpora

      - name: Crear Estructura de Carpetas
        run: mkdir -p data/raw data/processed

      - name: Entrenar Modelo (Solo los Lunes o Manual)
        if: github.event.schedule == '0 11 * * 1' || github.event_name == 'workflow_dispatch'
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/generar_features.py
          python src/entrenar_modelo.py

      - name: Ejecutar Escáner de Apuestas
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p data/processed
          # Ejecución directa con variables cargadas en el entorno del proceso
          python src/main.py
