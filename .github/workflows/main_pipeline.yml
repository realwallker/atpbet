name: ATP Bypass Daily Scan

on:
  schedule:
    # 08:00 UTC = 03:00 AM en Guayaquil (ECT) - Todos los días
    - cron: "0 8 * * *"
    # 11:00 UTC = 06:00 AM en Guayaquil - Solo los lunes (reentrenamiento)
    - cron: "0 11 * * 1"
  workflow_dispatch: # Permite ejecución manual desde GitHub

jobs:
  run-bypass:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v3

      - name: Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar Librerías Necesarias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy xgboost scikit-learn requests textblob
          python -m textblob.download_corpora

      - name: Crear Estructura de Carpetas
        run: mkdir -p data/raw data/processed

      - name: Reentrenar Modelo (Solo los Lunes o Manual)
        # FIX: El schedule del if debe coincidir con el cron real declarado arriba
        if: github.event.schedule == '0 11 * * 1' || github.event_name == 'workflow_dispatch'
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/generar_features.py
          python src/entrenar_modelo.py

      - name: Ejecutar Escáner de Apuestas
        # Solo corre en el scan diario (08:00 UTC) o manual, NO en el reentrenamiento
        if: github.event.schedule == '0 8 * * *' || github.event_name == 'workflow_dispatch'
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p data/processed
          python src/main.py
